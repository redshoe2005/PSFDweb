<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Variables Group Table Demo</title>
  <style>
/* =========================
   Polished Dashboard CSS
   + NEW single topbar design (no overlap)
   ========================= */

/* ====== Theme tokens ====== */
:root{
  --navy: #003366;
  --navy-2: #00284f;
  --accent: #00a2e8;
  --accent-2:#007bff;

  --bg: #f6f8fb;
  --card: #ffffff;
  --text: #0f172a;
  --muted:#64748b;
  --border:#e6eaf0;

  --shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
  --shadow2: 0 6px 18px rgba(2, 6, 23, 0.10);

  --radius: 14px;

  /* layout sizes */
  --sidebar-w: 220px;
  --gap: 18px;

  /* top bar */
  --topbar-h: 64px;
}

/* ====== Global layout: NO page scroll, only table scroll ====== */
html, body{
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
}

body{
  display: flex;
}

/* Sidebar container */
.sidebar{
  width: var(--sidebar-w);
  height: 100vh;
  box-sizing: border-box;
  overflow-y: auto;
  padding: 20px 18px;

  background:
    radial-gradient(900px 520px at 10% 0%, rgba(0,162,232,0.22), transparent 55%),
    radial-gradient(650px 420px at 70% 25%, rgba(255,255,255,0.08), transparent 60%),
    linear-gradient(180deg, #05396b 0%, #022345 65%, #011a35 100%);

  color: #fff;
  box-shadow: 0 18px 40px rgba(2,6,23,0.22);
  border-right: 1px solid rgba(255,255,255,0.08);
  position: sticky;
  top: 0;
}

.sidebar::before{
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(255,255,255,0.10), transparent 45%);
  opacity: 0.55;
}

.sidebar h2{
  margin: 4px 0 14px 0;
  padding: 10px 12px;

  font-size: 14px;
  font-weight: 900;
  letter-spacing: 1.2px;
  text-transform: uppercase;

  color: rgba(255,255,255,0.92);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 14px;
}

.sidebar ul{
  margin: 0;
  padding: 0;
  list-style: none;
}

.sidebar li{
  position: relative;
  display: flex;
  align-items: center;
  gap: 10px;

  padding: 10px 12px;
  margin: 0 0 8px 0;

  border-radius: 14px;
  color: rgba(255,255,255,0.92);
  font-size: 14px;
  font-weight: 750;
  letter-spacing: 0.2px;

  cursor: pointer;
  user-select: none;

  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);

  transition:
    transform 0.14s ease,
    background 0.14s ease,
    border-color 0.14s ease,
    box-shadow 0.14s ease;
}

.sidebar li::before{
  content: "";
  width: 6px;
  height: 18px;
  border-radius: 999px;
  background: rgba(255,255,255,0.18);
  flex: 0 0 auto;
  transition: background 0.14s ease, box-shadow 0.14s ease;
}

.sidebar li:hover{
  transform: translateX(2px);
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.12);
  box-shadow: 0 10px 18px rgba(2,6,23,0.18);
}

.sidebar li:hover::before{
  background: rgba(0,162,232,0.55);
  box-shadow: 0 0 0 4px rgba(0,162,232,0.10);
}

.sidebar li.active{
  background: rgba(0,162,232,0.14);
  border-color: rgba(0,162,232,0.28);
  box-shadow: 0 16px 28px rgba(0,162,232,0.10);
}

.sidebar li.active::before{
  background: rgba(0,162,232,0.95);
  box-shadow: 0 0 0 4px rgba(0,162,232,0.14);
}

/* ====== Main content ====== */
.main-content{
  flex: 1;
  height: 100vh;
  box-sizing: border-box;
  padding: calc(var(--topbar-h) + 30px) 24px 18px 24px;
  overflow: hidden;
  position: relative;
}

/* =========================
   ✅ NEW TOPBAR (single, no overlap)
   ========================= */
#topbar{
  position: fixed;
  top: 14px;
  left: calc(var(--sidebar-w) + var(--gap));
  right: 24px;
  z-index: 999;

  display: grid;
  grid-template-columns: minmax(220px, 1fr) minmax(260px, 420px) auto auto;
  gap: 12px;
  align-items: center;

  height: var(--topbar-h);
  padding: 10px 14px;

  background: rgba(255,255,255,0.90);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(230,234,240,0.85);
  box-shadow: 0 8px 24px rgba(2,6,23,0.06);
  border-radius: 16px;
}

.topbar-title{
  font-size: 20px;
  font-weight: 900;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* search */
.topbar-search{ display:flex; }
.search-box{
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;

  background: rgba(245,248,252,0.95);
  border: 1px solid rgba(15,23,42,0.10);
  border-radius: 999px;
  padding: 10px 12px;
}
#search-input{
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  font-size: 14px;
  color: var(--text);
}
#search-clear{
  border: none;
  outline: none;
  cursor: pointer;
  background: rgba(15,23,42,0.06);
  border-radius: 999px;
  width: 30px;
  height: 30px;
  font-weight: 900;
}
#search-clear:hover{ opacity: 0.85; }

/* counts */
#counts-panel{
  display: flex;
  gap: 12px;
  align-items: center;

  background: rgba(245,248,252,0.65);
  border: 1px solid rgba(15,23,42,0.08);
  border-radius: 14px;
  padding: 8px 10px;
}
.kpi{
  display:flex;
  flex-direction: column;
  align-items: center;
  min-width: 88px;
}
.kpi-label{
  font-size: 12px;
  font-weight: 800;
  color: var(--muted);
  letter-spacing: 0.4px;
}
.kpi-value{
  font-size: 18px;
  font-weight: 950;
  color: var(--text);
  line-height: 1.1;
}

/* buttons */
.topbar-actions{
  display: flex;
  gap: 12px;
  align-items: center;
}
.btn-pill{
  border: none;
  cursor: pointer;
  border-radius: 999px;
  padding: 12px 18px;
  font-weight: 900;
  font-size: 14px;
  line-height: 1.05;
  white-space: nowrap;
  box-shadow: 0 10px 22px rgba(2,6,23,0.10);
  transition: transform 0.12s ease, opacity 0.12s ease, box-shadow 0.12s ease;
}
.btn-pill:hover{
  transform: translateY(-1px);
  opacity: 0.95;
  box-shadow: 0 14px 28px rgba(2,6,23,0.14);
}
.btn-accent{
  background: linear-gradient(180deg, var(--accent) 0%, #0092d3 100%);
  color: #fff;
}
.btn-navy{
  background: linear-gradient(180deg, #0b5aa8 0%, #094a8a 100%);
  color: #fff;
}

/* Responsive: narrow screens -> stack topbar */
@media (max-width: 1100px){
  #topbar{
    grid-template-columns: 1fr;
    height: auto;
    padding: 12px 14px;
  }
  .main-content{ padding-top: 190px; }
  #counts-panel{ justify-content: flex-start; }
  .topbar-actions{ justify-content: flex-start; flex-wrap: wrap; }
}

/* ====== Table container: the ONLY scroll area ====== */
.table-container{
  height: calc(100vh - (var(--topbar-h) + 30px) - 24px);
  margin-top: 10px;

  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: var(--shadow);
  padding: 14px;

  overflow: auto;
}

/* ====== Table styling ====== */
table{
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  min-width: 1200px;
  margin-top: 0;
  border: none;
}

th, td{
  border-bottom: 1px solid var(--border);
  padding: 10px 10px;
  font-size: 13px;
  text-align: center;
}

thead th{
  position: sticky;
  top: 0;
  background: #f8fafc;
  z-index: 3;
  color: #0b1f3a;
  font-weight: 900;
  letter-spacing: 0.2px;
}

tbody tr:nth-child(odd){ background: #fcfdff; }
tr:hover{ background: #f3f8ff; }

th.sticky{
  position: sticky;
  left: 0;
  background: #f8fafc;
  z-index: 4;
  box-shadow: 8px 0 14px rgba(2,6,23,0.05);
}

/* ====== Sample Selection View – keep your existing styles ====== */
#sample-view{
  display: none;
  height: 100vh;
  overflow: hidden;
  box-sizing: border-box;
  padding: calc(var(--topbar-h) + 30px) 24px 18px 24px;
  background: var(--bg);
}
#sample-view #years-table{
  width: 100%;
  max-width: 720px;
  margin-top: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
#sample-view #years-table thead,
#sample-view #years-table tbody tr{
  display: table;
  width: 100%;
  table-layout: fixed;
}
#sample-view #years-table tbody{
  display: block;
  max-height: calc(100vh - (var(--topbar-h) + 30px) - 18px - 90px);
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: 120px;
  box-sizing: border-box;
}
#sample-view #years-table thead th{
  position: sticky;
  top: 0;
  z-index: 3;
  background: #f8fafc;
  color: #0b1f3a;
  font-weight: 900;
  letter-spacing: 0.2px;
  border-bottom: 1px solid var(--border);
}
#sample-view #years-table th,
#sample-view #years-table td{
  padding: 12px 14px;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}
#sample-view #years-table th:first-child,
#sample-view #years-table td:first-child{
  width: 110px;
  text-align: center;
}
#sample-view #years-table tbody tr:nth-child(odd){ background: #fcfdff; }
#sample-view #years-table tbody tr:hover{ background: #f3f8ff; }
#sample-view #years-table input[type="checkbox"]{
  width: 18px;
  height: 18px;
  accent-color: var(--accent-2);
  cursor: pointer;
}

/* Cart view */
#cart-view{ overflow: hidden; }

#cart-view h1,
#sample-view h1{
  margin: 0;
  font-size: 20px;
  font-weight: 900;
  color: var(--text);
}

.cart-action-row button{
  background: #eef5ff;
  color: var(--navy);
  border: 1px solid #dbe7ff;
  padding: 12px 16px;
  font-size: 16px;
  font-weight: 900;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.12s ease, opacity 0.12s ease;
}
.cart-action-row button:last-child{
  background: linear-gradient(180deg, var(--accent-2) 0%, #1f66d0 100%);
  color: #fff;
  border: none;
}
.cart-action-row button:hover{
  transform: translateY(-1px);
  opacity: 0.92;
}

#sample-confirm, #goback{
  background-color: var(--navy);
  color: white;
  border: none;
  padding: 14px 18px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
  font-weight: 900;
}
#sample-confirm:hover, #goback:hover{
  background-color: var(--accent-2);
}
  </style>
</head>

<body>

<div class="sidebar">
  <h2>Variable Groups</h2>
  <ul id="group-list"></ul>
</div>

<!-- Main view -->
<div class="main-content" id="main-view">

  <!-- ✅ Single Topbar -->
  <div id="topbar">
    <div class="topbar-title" id="group-title-main">Select a Variable Group</div>

    <div class="topbar-search">
      <div class="search-box">
        <input id="search-input" type="text" placeholder="Search (home: all groups / inside group: this group)" />
        <button id="search-clear" type="button">✕</button>
      </div>
    </div>

    <div class="topbar-counts" id="counts-panel">
      <div class="kpi">
        <div class="kpi-label">VARIABLES</div>
        <div class="kpi-value" id="variable-count">0</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">SAMPLES</div>
        <div class="kpi-value" id="sample-count">0</div>
      </div>
    </div>

    <div class="topbar-actions">
      <button class="btn-pill btn-accent" type="button" onclick="showCartView()">VIEW CART</button>
      <button class="btn-pill btn-navy" id="sample" type="button" onclick="selectSample()">Select<br>Samples</button>
    </div>
  </div>

  <div class="table-container">
    <table id="variables-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<!-- Cart view -->
<div class="main-content" id="cart-view" style="display: none;">
  <h1 id="group-title-cart">Data Cart</h1>

  <div class="cart-action-row" style="margin-bottom: 16px; display: flex; gap: 16px;">
    <button id="add-variable-btn" onclick="goBack()">ADD MORE VARIABLES</button>
    <button id="add-sample-btn" onclick="selectSample()">ADD MORE SAMPLES</button>
    <button id="extract-btn" style="display: none;">CREATE DATA EXTRACT</button>
  </div>

  <table id="cart-variables-table">
    <thead id="cart-table-head"></thead>
    <tbody id="cart-table-body"></tbody>
  </table>

  <div class="bottom-row" style="text-align: right; margin-top: 10px;">
    <button id="goback" onclick="goBack()">Back</button>
  </div>
</div>

<!-- Sample view -->
<div class="main-content" id="sample-view" style="display: none;">
  <h1 id="group-title-sample">Select Sample Years</h1>
  <table id="years-table">
    <thead>
      <tr>
        <th>Select</th>
        <th>Sample</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div style="text-align: right; margin-top: 20px;">
    <button id="sample-confirm" onclick="confirmSample()">Confirm</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
